<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard ESG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Dashboard ESG</span>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-header">Média por Categoria</div>
            <div class="card-body">
              <div style="height:220px">
                <canvas id="mediaChart"></canvas>
              </div>
              <div class="mt-3" style="height:220px">
                <canvas id="mediaPieChart"></canvas>
              </div>
              <div class="mt-2">
                <button id="refreshChart" class="btn btn-sm btn-primary">Atualizar gráfico</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-header">Relatório Auditoria (Registros Validados)</div>
            <div class="card-body">
              <button id="loadAuditoria" class="btn btn-sm btn-secondary mb-2">Carregar</button>
              <div class="table-responsive" style="max-height:320px;overflow:auto">
                <table class="table table-sm table-striped" id="auditoriaTable">
                  <thead><tr><th>Empresa</th><th>Data</th><th>Valor</th><th>Auditor</th></tr></thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card mb-3">
            <div class="card-header">Hierarquia de Empresas</div>
            <div class="card-body">
              <button id="loadHierarquia" class="btn btn-sm btn-secondary mb-2">Carregar</button>
              <div class="table-responsive">
                <table class="table table-sm" id="hierarquiaTable">
                  <thead><tr><th>Subsidiária</th><th>Controladora</th></tr></thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
